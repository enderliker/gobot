{{define "content"}}
<section class="error-section">
    <div class="container error-container">
        <div class="error-badge">404 — NOT FOUND</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-text">The requested route <code class="highlight-code">{{.Path}}</code> does not match any registered endpoints.</p>
        <div class="error-actions">
            <a href="/" class="btn-primary">Return Home</a>
            <a href="/docs" class="btn-secondary">View Documentation</a>
        </div>
    </div>
</section>
{{end}}
