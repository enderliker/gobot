{{define "content"}}
<section class="error-section">
    <div class="container error-container">
        <div class="error-badge">404 — NOT FOUND</div>
        <h1 class="error-title">Ruta Desconocida</h1>
        <p class="error-text">La ruta <code class="highlight-code">{{.Path}}</code> no ha sido registrada por el router del servidor o no existe.</p>
        <div class="error-actions">
            <a href="/" class="btn-primary">Volver al Inicio</a>
            <a href="/docs" class="btn-secondary" target="_blank" rel="noopener">Ir a Documentación</a>
        </div>
    </div>
</section>
{{end}}
