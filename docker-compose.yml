services:
  db:
    image: mysql:8.0
    container_name: gobot_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gobot_root_password
      MYSQL_DATABASE: gobot_db
      MYSQL_USER: gobot_user
      MYSQL_PASSWORD: gobot_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  gobot:
    build: .
    container_name: gobot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: gobot_web
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - WEB_PORT=8081
      - WEB_DISCORD_INVITE_URL=${WEB_DISCORD_INVITE_URL}
      - DB_DRIVER=${DB_DRIVER}
      - DB_DSN=${DB_DSN}
      - ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:

